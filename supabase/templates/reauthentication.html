<!--
  Supabase Auth — Reauthentication code (sensitive operations)
  Wired in supabase/config.toml under [auth.email.template.reauthentication]
  Supabase vars used: {{ .Token }}
  Suggested subject:  Your YourScore confirmation code
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting"><meta name="color-scheme" content="dark"><meta name="supported-color-schemes" content="dark">
  <title>Your confirmation code</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body,table,td{margin:0;padding:0}a{color:#00ff87;text-decoration:none}table{border-collapse:collapse}
    @media (max-width:600px){.container{width:100%!important}.px{padding-left:24px!important;padding-right:24px!important}.headline{font-size:32px!important;line-height:36px!important}.code{font-size:48px!important;letter-spacing:8px!important}}</style>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:'DM Sans',Helvetica,Arial,sans-serif;color:#ffffff;">
  <div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#0a0a0f;">Use this code to confirm it's you. Expires in 10 minutes.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0f;"><tr><td align="center" style="padding:32px 16px;">
    <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;">

      <tr><td class="px" style="padding:0 40px 24px;"><div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:28px;letter-spacing:2px;color:#ffffff;">YOURSCORE</div></td></tr>

      <tr><td class="px" style="padding:0 40px 16px;">
        <h1 class="headline" style="margin:0;font-family:'Bebas Neue',Impact,sans-serif;font-size:44px;line-height:48px;letter-spacing:1px;color:#ffffff;">ENTER THIS CODE.</h1>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 32px;">
        <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:16px;line-height:24px;color:#ffffff;">
          Use this code to confirm it's you. Expires in 10 minutes.
        </p>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 32px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#12121e;border-radius:12px;border:1px solid rgba(255,255,255,0.08);"><tr><td align="center" style="padding:32px 24px;">
          <p style="margin:0 0 12px;font-family:'Bebas Neue',Impact,sans-serif;font-size:14px;letter-spacing:1.5px;color:#8888aa;">YOUR CODE</p>
          <div class="code" style="font-family:'Bebas Neue',Impact,sans-serif;font-size:64px;letter-spacing:12px;color:#00ff87;line-height:1;">{{ .Token }}</div>
        </td></tr></table>
      </td></tr>

      <tr><td class="px" style="padding:48px 40px 24px;border-top:1px solid rgba(255,255,255,0.08);">
        <p style="margin:0 0 8px;font-size:12px;line-height:18px;color:#8888aa;font-family:'DM Sans',Helvetica,Arial,sans-serif;"><strong style="color:#ffb800;">Didn't request this?</strong> Ignore the email. The code expires on its own.</p>
        <p style="margin:0;font-family:'Bebas Neue',Impact,sans-serif;font-size:14px;letter-spacing:1.5px;color:#8888aa;">YOURSCORE · YOUR FOOTBALL KNOWLEDGE. RANKED.</p>
      </td></tr>
    </table>
  </td></tr></table>
</body></html>
