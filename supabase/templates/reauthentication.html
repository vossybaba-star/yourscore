<!--
  Supabase Auth — Reauthentication code (sensitive operations)
  Wired in supabase/config.toml under [auth.email.template.reauthentication]
  Supabase vars: {{ .Token }}
  Suggested subject: Your YourScore confirmation code
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting"><meta name="color-scheme" content="dark"><meta name="supported-color-schemes" content="dark">
  <title>Your confirmation code</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body,table,td{margin:0;padding:0}img{border:0;outline:none;text-decoration:none;display:block}table{border-collapse:collapse}a{text-decoration:none}
    @media (max-width:600px){.container{width:100%!important}.px{padding-left:24px!important;padding-right:24px!important}.headline{font-size:40px!important;line-height:42px!important}.code{font-size:52px!important;letter-spacing:10px!important}}</style>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:'DM Sans',Helvetica,Arial,sans-serif;color:#ffffff;">
  <div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#0a0a0f;">Use this code to confirm it's you. Expires in 10 minutes.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0f;background-image:linear-gradient(180deg,#0a0a0f 0%,#0e0e1a 100%);"><tr><td align="center" style="padding:40px 16px;">
    <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;">

      <tr><td align="center" class="px" style="padding:0 40px 36px;">
        <a href="https://yourscore.app"><img src="https://yourscore.app/logo.png" alt="YourScore" width="148" height="44" style="width:148px;height:44px;display:block;"></a>
      </td></tr>

      <tr><td class="px" align="left" style="padding:0 40px 18px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0"><tr>
          <td bgcolor="#241e10" style="background:rgba(255,184,0,0.1);border:1px solid rgba(255,184,0,0.3);border-radius:999px;padding:6px 14px;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;color:#ffb800;font-weight:700;text-transform:uppercase;">&#128274; Identity check</td>
        </tr></table>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 14px;">
        <h1 class="headline" style="margin:0;font-family:'Bebas Neue',Impact,Arial,sans-serif;font-size:54px;line-height:52px;color:#ffffff;font-weight:400;">ENTER THIS CODE.</h1>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 32px;">
        <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:17px;line-height:26px;color:#bbbbcc;">
          Use this code to confirm it's you. Expires in 10 minutes.
        </p>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 28px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#12121e" style="background:linear-gradient(135deg,rgba(0,255,135,0.08) 0%,rgba(18,18,30,0.95) 100%);border-radius:16px;border:1px solid rgba(0,255,135,0.25);">
          <tr><td align="center" style="padding:30px 24px 6px;">
            <div style="font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;color:#8888aa;font-weight:600;text-transform:uppercase;">Your code</div>
          </td></tr>
          <tr><td align="center" style="padding:6px 24px 30px;">
            <div class="code" style="font-family:'Bebas Neue',Impact,sans-serif;font-size:64px;letter-spacing:14px;color:#00ff87;line-height:1;text-shadow:0 0 28px rgba(0,255,135,0.4);">{{ .Token }}</div>
          </td></tr>
        </table>
      </td></tr>

      <tr><td class="px" style="padding:0 40px 0;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#12121e" style="background:linear-gradient(135deg,rgba(255,184,0,0.06) 0%,rgba(10,10,15,0.95) 100%);border-radius:14px;border:1px solid rgba(255,184,0,0.22);">
          <tr><td style="padding:16px 18px;">
            <div style="font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:13px;color:#ffb800;font-weight:700;margin-bottom:4px;">Didn't request this?</div>
            <div style="font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:13px;color:#bbbbcc;line-height:18px;">Ignore the email. The code expires on its own.</div>
          </td></tr>
        </table>
      </td></tr>

      <tr><td class="px" style="padding:56px 40px 24px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="border-top:1px solid rgba(255,255,255,0.06);padding-top:24px;">
          <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:1.5px;color:#6b6b85;text-transform:uppercase;font-weight:600;">YourScore &nbsp;&middot;&nbsp; Your football knowledge. Ranked.</p>
        </td></tr></table>
      </td></tr>
    </table>
  </td></tr></table>
</body></html>
