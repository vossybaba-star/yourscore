<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YourScore — Play Store Feature Graphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0a0a14; }
  body {
    width: 1024px;
    height: 500px;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
  .glow-purple {
    position: absolute; top: -100px; left: -150px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(167,139,250,0.18) 0%, transparent 60%);
    z-index: 1;
  }
  .glow-green {
    position: absolute; bottom: -150px; right: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,255,135,0.16) 0%, transparent 60%);
    z-index: 1;
  }
  .stage {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 480px;
    height: 100%;
    padding: 56px 64px;
    gap: 48px;
    align-items: center;
  }
  .copy h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 0.95;
    letter-spacing: 0.015em;
    margin-bottom: 18px;
  }
  .copy h1 .accent-y { color: #00ff87; }
  .copy h1 .accent-s { color: #00ff87; }
  .copy p {
    font-size: 22px;
    line-height: 1.4;
    color: #c0c0d8;
    max-width: 460px;
    margin-bottom: 28px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0,255,135,0.1);
    border: 1px solid rgba(0,255,135,0.32);
    color: #00ff87;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pill::before {
    content: "";
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff87;
    box-shadow: 0 0 12px rgba(0,255,135,0.7);
  }
  /* phone mockup */
  .phone {
    position: relative;
    width: 290px;
    height: 405px;
    border-radius: 38px;
    background: linear-gradient(160deg, #1a1a2e, #0a0a14);
    border: 8px solid #0d0d18;
    box-shadow: 0 28px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
    margin-left: auto;
    overflow: hidden;
    padding: 26px 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .phone-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.12em;
    color: #fff;
  }
  .wordmark .a { color: #00ff87; }
  .timer-ring {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2.5px solid #00ff87;
    border-top-color: rgba(0,255,135,0.18);
  }
  .question-card {
    background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(0,255,135,0.05));
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 16px;
    padding: 14px 14px 12px;
    margin-top: 2px;
  }
  .q-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    color: #a78bfa;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    background: #12121e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    color: #d6d6e8;
    display: flex; align-items: center; gap: 10px;
  }
  .opt.correct {
    background: rgba(0,255,135,0.12);
    border-color: #00ff87;
    color: #fff;
  }
  .opt-letter {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #c0c0d8;
  }
  .opt.correct .opt-letter { background: #00ff87; color: #0a0a14; }
  .leaderboard-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: #12121e;
    border-radius: 10px;
    font-size: 11px;
    margin-top: auto;
  }
  .lb-name { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 600; }
  .rank { color: #a78bfa; font-weight: 700; }
  .points { color: #00ff87; font-weight: 700; font-size: 12px; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-purple"></div>
  <div class="glow-green"></div>

  <div class="stage">
    <div class="copy">
      <span class="pill">Live Football Quiz</span>
      <h1 style="margin-top: 14px;">
        <span class="accent-y">Y</span>OUR FOOTBALL<br>
        KNOWLEDGE.<br>
        RANKED.
      </h1>
      <p>Watch every match with your mates. Answer live questions. Climb the leaderboard all season.</p>
    </div>

    <div class="phone">
      <div class="phone-header">
        <span class="wordmark"><span class="a">Y</span>OUR<span class="a">S</span>CORE</span>
        <div class="timer-ring"></div>
      </div>

      <div class="question-card">
        <div class="q-label">QUESTION · 30s</div>
        <div class="q-text">Who scored England's opening goal in this match?</div>
      </div>

      <div class="options">
        <div class="opt"><span class="opt-letter">A</span>Harry Kane</div>
        <div class="opt correct"><span class="opt-letter">B</span>Bukayo Saka</div>
        <div class="opt"><span class="opt-letter">C</span>Phil Foden</div>
      </div>

      <div class="leaderboard-row">
        <span class="lb-name"><span class="rank">#1</span> Marcus</span>
        <span class="points">2,840 pts</span>
      </div>
    </div>
  </div>
</body>
</html>
