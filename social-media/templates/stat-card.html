<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>YourScore – Stat Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0B0B14;
    --card:      #13131F;
    --card-2:    #1A1A2E;
    --green:     #00C853;
    --green-dim: rgba(0,200,83,0.12);
    --purple:    #9B7FFF;
    --purple-dim:rgba(155,127,255,0.12);
    --white:     #FFFFFF;
    --muted:     #6B6F8A;
    --border:    rgba(255,255,255,0.06);
  }

  html {
    background: #050509;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  body {
    width: 1080px;
    height: 1350px;
    transform-origin: top center;
    background-color: var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    font-family: 'Figtree', sans-serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Subtle radial glow top-left */
  body::before {
    content: '';
    position: absolute;
    top: -200px;
    left: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(155,127,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    padding: 56px 64px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 0.06em;
    color: var(--white);
    text-transform: uppercase;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dim);
    border: 1px solid rgba(0,200,83,0.25);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'Figtree', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--green);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .chip-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* ── MAIN CONTENT ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    gap: 0;
  }

  .season-label {
    font-family: 'Figtree', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 32px;
  }

  /* Giant stat hero */
  .stat-hero {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 20px;
    line-height: 1;
  }

  .stat-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 280px;
    color: var(--green);
    line-height: 0.85;
    letter-spacing: -0.02em;
  }

  .stat-label-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-bottom: 28px;
  }

  .stat-unit {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 48px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .stat-sublabel {
    font-family: 'Figtree', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Divider rule */
  .rule {
    height: 1px;
    background: var(--border);
    margin: 36px 0;
  }

  /* Player card */
  .player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .player-meta {
    font-family: 'Figtree', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--muted);
    line-height: 1.5;
  }

  .player-meta strong {
    color: var(--white);
    font-weight: 600;
  }

  /* Record line */
  .record-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .record-tag {
    background: var(--purple-dim);
    border: 1px solid rgba(155,127,255,0.25);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Figtree', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .record-text {
    font-family: 'Figtree', sans-serif;
    font-weight: 400;
    font-size: 19px;
    color: var(--muted);
  }

  .record-text strong {
    color: var(--white);
    font-weight: 600;
  }

  /* Sunday hook */
  .hook {
    margin-top: 36px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 38px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .hook span {
    color: var(--green);
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    margin: 0 64px 56px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .bottom-wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 0.06em;
    color: var(--white);
    text-transform: uppercase;
  }

  .bottom-cta {
    font-family: 'Figtree', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: var(--muted);
  }

  .bottom-cta strong {
    color: var(--green);
    font-weight: 600;
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="wordmark">YOURSCORE</div>
    <div class="chip">
      <span class="chip-dot"></span>
      2025/26 PL Season
    </div>
  </div>

  <!-- MAIN -->
  <div class="content">
    <div class="season-label">Premier League assists record</div>

    <div class="stat-hero">
      <div class="stat-number">20</div>
      <div class="stat-label-stack">
        <div class="stat-unit">Assists</div>
        <div class="stat-sublabel">This season</div>
      </div>
    </div>

    <div class="player-card">
      <div class="player-name">Bruno Fernandes</div>
      <div class="player-meta">
        <strong>Man United</strong> · 34 appearances · 8 goals
      </div>
      <div class="record-row">
        <div class="record-tag">= All-time record</div>
        <div class="record-text">Matched <strong>Henry (2003)</strong> & <strong>De Bruyne (2020)</strong></div>
      </div>
    </div>

    <div class="hook">
      Can he break it <span>on Sunday?</span>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="bottom-wordmark">YOURSCORE</div>
    <div class="bottom-cta">Test your football IQ → <strong>yourscore.app</strong></div>
  </div>


<script>
  function fitToScreen() {
    const W = 1080, H = 1350;
    const s = Math.min((window.innerWidth - 24) / W, (window.innerHeight - 24) / H);
    document.body.style.transform = `scale(${s})`;
    document.body.style.marginTop = Math.max(0, (window.innerHeight - H * s) / 2 - 12) + 'px';
  }
  window.addEventListener('load', fitToScreen);
  window.addEventListener('resize', fitToScreen);
</script>
</body>
</html>
